---
- name: Pre-check and resolve apt lock issues
  hosts: all
  tasks:
    - name: Stop unattended-upgrades service
      service:
        name: unattended-upgrades
        state: stopped
      ignore_errors: yes

    - name: Kill conflicting apt/dpkg processes
      shell: |
        ps aux | grep '[a]pt' | awk '{print $2}' | xargs -r kill -9
        ps aux | grep '[d]pkg' | awk '{print $2}' | xargs -r kill -9
      ignore_errors: yes

    - name: Remove apt lock files
      file:
        path: /var/lib/dpkg/lock-frontend
        state: absent
      ignore_errors: yes

    - name: Remove dpkg lock file
      file:
        path: /var/lib/dpkg/lock
        state: absent
      ignore_errors: yes

    - name: Ensure dpkg is not in a broken state
      shell: dpkg --configure -a
      ignore_errors: yes

- name: Install Java and Gradle
  hosts: all
  tasks:
    - name: Update apt repository and cache
      apt:
        update_cache: yes
        force_apt_get: yes
        cache_valid_time: 3600
      retries: 5
      delay: 10

    - name: Install Java
      apt:
        pkg:
          - openjdk-17-jdk
          - openjdk-17-jre
      register: result
      until: result is not failed
      retries: 5
      delay: 5

    - name: Install dependencies for Gradle
      apt:
        pkg:
          - wget
          - unzip
      retries: 5
      delay: 10

    - name: Download Gradle 8
      shell: |
        wget https://services.gradle.org/distributions/gradle-8.2.1-bin.zip -O /tmp/gradle-8.2.1-bin.zip
        unzip /tmp/gradle-8.2.1-bin.zip -d /opt/
      args:
        creates: /opt/gradle-8.2.1
      retries: 5
      delay: 10

    - name: Create symbolic link for Gradle
      file:
        src: /opt/gradle-8.2.1/bin/gradle
        dest: /usr/bin/gradle
        state: link

    - name: Verify Gradle installation
      command: gradle --version
      register: gradle_version

    - debug:
        msg: "Gradle successfully installed. Version info: {{ gradle_version.stdout }}"

- name: Install Node.js and npm
  hosts: all
  tasks:
    - name: Install curl
      apt:
        name: curl
        state: present
      register: result
      until: result is not failed
      retries: 5
      delay: 5

    - name: Add Node.js repository
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
      register: result
      until: result is not failed
      retries: 5
      delay: 5

    - name: Install Node.js and npm
      apt:
        name: nodejs
        state: present
      register: result
      until: result is not failed
      retries: 5
      delay: 5

    - name: Verify Node.js installation
      command: node --version
      register: node_version

    - debug:
        msg: "Node.js successfully installed. Version: {{ node_version.stdout }}"

    - name: Verify npm installation
      command: npm --version
      register: npm_version

    - debug:
        msg: "npm successfully installed. Version: {{ npm_version.stdout }}"

- name: Install Playwright
  hosts: all
  tasks:
    - name: Install Playwright globally
      npm:
        name: playwright
        global: yes

    - name: Verify Playwright installation
      command: playwright --version
      register: playwright_version

    - debug:
        msg: "Playwright successfully installed. Version: {{ playwright_version.stdout }}"

- name: Create Linux User
  hosts: all
  tasks:
    - name: Create linux-user group
      group:
        name: linux-user

    - name: Create new Linux user
      user:
        name: linux-user
        comment: Rody Admin
        group: linux-user
        create_home: yes

- name: Configure Firewall and Open Port 7071
  hosts: all
  tasks:
    - name: Allow port 7071 through UFW
      ufw:
        rule: allow
        port: 7071
        proto: tcp

    - name: Enable UFW if not already enabled
      ufw:
        state: enabled
        policy: allow
